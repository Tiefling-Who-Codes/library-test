<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Library Manager</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f2f5; margin: 0; padding: 20px; }
        .blue-box { background-color: #adcbe3; width: 380px; padding: 30px; border: 1px solid #000; box-shadow: 4px 4px 0px #000; }
        .white-inner { background: white; padding: 20px; border: 1px solid #000; display: flex; flex-direction: column; gap: 10px; }
        .input-row { display: flex; gap: 8px; }
        input { flex: 1; padding: 10px; background: #adcbe3; border: 1px solid #000; font-weight: bold; }
        button { cursor: pointer; border: 1px solid #000; background: #adcbe3; font-weight: bold; text-transform: uppercase; }
        .main-btn { padding: 15px; font-size: 16px; width: 100%; margin-top: 5px; }
        .details-area { border: 1px solid #000; background: #d1e3f0; padding: 12px; font-size: 13px; line-height: 1.4; }
        .label { font-weight: bold; color: #555; text-transform: uppercase; font-size: 10px; display: block; margin-top: 4px; }
        .value { font-weight: bold; color: #000; font-size: 14px; margin-bottom: 8px; display: block; }
        .loan-text { color: red; font-weight: bold; border-top: 1px dashed #000; pt: 8px; margin-top: 8px; }
        #scanner-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #reader { width: 320px; background: white; border: 2px solid #adcbe3; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="blue-box">
        <div class="white-inner">
            <div id="search-view">
                <div class="input-row" style="margin-bottom: 15px;">
                    <input type="text" id="isbn-search" placeholder="ISBN">
                    <button style="padding: 10px;" onclick="openScanner()">SCAN</button>
                </div>
                <button class="main-btn" onclick="lookupBook()">GO</button>
            </div>

            <div id="details-view" class="hidden">
                <div class="details-area" id="book-details" style="background: #e1edf7;">
                    <span class="label">Book Name</span>
                    <span class="value" id="disp-book-name">---</span>
                    <span class="label">Author / ISBN</span>
                    <span class="value" id="disp-book-meta">---</span>
                </div>

                <div class="details-area">
                    <span class="label">Verify Student ID</span>
                    <div class="input-row">
                        <input type="text" id="studentId" placeholder="ID NO" style="background: white;">
                        <button onclick="verifyStudent()" style="padding: 0 10px;">✔️</button>
                    </div>
                    <div id="student-data-display" class="hidden" style="margin-top: 10px;">
                        <span class="label">Full Name</span>
                        <span class="value" id="disp-student-name">---</span>
                        <span class="label">Tutor / Year / User</span>
                        <span class="value" id="disp-student-meta">---</span>
                        <div id="loan-list" class="loan-text"></div>
                    </div>
                </div>

                <div id="action-buttons" class="hidden">
                    <button class="main-btn" onclick="handleTransaction('borrow')">BORROW</button>
                    <button class="main-btn" onclick="handleTransaction('return')">RETURN</button>
                </div>
                <button style="background: none; border: none; text-decoration: underline; font-size: 11px; align-self: center;" onclick="resetUI()">← NEW SEARCH</button>
            </div>
        </div>
    </div>

    <div id="scanner-modal">
        <div id="reader"></div>
        <button style="margin-top:20px; background:white; padding:10px 20px;" onclick="closeScanner()">CANCEL</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCF-9XTUu7USBk6vXtuN2140tlgXg-PgBM",
            authDomain: "school-library-61744.firebaseapp.com",
            projectId: "school-library-61744",
            storageBucket: "school-library-61744.firebasestorage.app",
            messagingSenderId: "583661514926",
            appId: "1:583661514926:web:7804174a5a127198fb3d3f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let scanner = null;

        window.resetUI = () => {
            document.getElementById('search-view').classList.remove('hidden');
            document.getElementById('details-view').classList.add('hidden');
            document.getElementById('student-data-display').classList.add('hidden');
            document.getElementById('action-buttons').classList.add('hidden');
            document.getElementById('studentId').value = '';
            document.getElementById('isbn-search').value = '';
        };

        window.openScanner = () => {
            document.getElementById('scanner-modal').style.display = 'flex';
            scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 150} });
            scanner.render((text) => {
                document.getElementById('isbn-search').value = text;
                closeScanner();
                lookupBook();
            });
        };

        window.closeScanner = () => { if (scanner) scanner.clear(); document.getElementById('scanner-modal').style.display = 'none'; };

        window.lookupBook = async () => {
            const isbn = document.getElementById('isbn-search').value.trim();
            if (!isbn) return;
            const snap = await getDoc(doc(db, "books", isbn));
            if (!snap.exists()) return alert("Book record missing!");
            const data = snap.data();
            document.getElementById('disp-book-name').innerText = data.name || "Unknown";
            document.getElementById('disp-book-meta').innerText = `${data.author || 'No Author'} | ISBN: ${isbn}`;
            document.getElementById('search-view').classList.add('hidden');
            document.getElementById('details-view').classList.remove('hidden');
        };

        window.verifyStudent = async () => {
            const sid = document.getElementById('studentId').value.trim();
            if (!sid) return;
            const snap = await getDoc(doc(db, "students", sid));
            if (!snap.exists()) return alert("Student not found!");
            const d = snap.data();
            document.getElementById('disp-student-name').innerText = `${d.Name} ${d["Last Name"]}`;
            document.getElementById('disp-student-meta').innerText = `Tutor: ${d.Tutor} | Yr: ${d.Year} | @${d.username}`;
            let loans = [];
            for (const [key, val] of Object.entries(d)) {
                if (typeof val === 'object' && val?.status === "borrowed") loans.push(val.title || key);
            }
            document.getElementById('loan-list').innerText = loans.length > 0 ? `LOAN: ${loans.join(', ')}` : "No current loans";
            document.getElementById('student-data-display').classList.remove('hidden');
            document.getElementById('action-buttons').classList.remove('hidden');
        };

        window.handleTransaction = async (type) => {
            const sid = document.getElementById('studentId').value.trim();
            const isbn = document.getElementById('isbn-search').value.trim();
            const bName = document.getElementById('disp-book-name').innerText;
            const time = new Date().toLocaleString();
            
            // CHECK FOR ACTIVE LOAN
            const hasActiveLoan = document.getElementById('loan-list').innerText.includes("LOAN:");

            if (type === 'borrow' && hasActiveLoan) {
                const pin = prompt("STUDENT ALREADY HAS A LOAN. Enter Admin PIN to override:");
                if (!pin) return;

                const adminSnap = await getDoc(doc(db, "admin", pin));
                if (!adminSnap.exists()) {
                    return alert("INVALID ADMIN PIN. Borrowing blocked.");
                }
                alert(`Admin Override Verified: ${adminSnap.data().Name}`);
            }

            try {
                await setDoc(doc(db, "students", sid), {
                    [isbn]: { title: bName, borrowDate: type === 'borrow' ? time : null, status: type === 'borrow' ? "borrowed" : "returned" }
                }, { merge: true });

                await updateDoc(doc(db, "books", isbn), {
                    borrowHistory: arrayUnion({ studentId: sid, date: time, action: type })
                });

                alert(`SUCCESS: ${type.toUpperCase()} COMPLETED`);
                resetUI();
            } catch (e) { alert("Error: " + e.message); }
        };
    </script>
</body>
</html>
