<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Library Manager</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .blue-box { background-color: #adcbe3; width: 360px; min-height: 580px; padding: 40px; border: 1px solid #000; box-shadow: 4px 4px 0px #000; }
        .white-inner { background: white; padding: 25px; border: 1px solid #000; display: flex; flex-direction: column; gap: 12px; height: 100%; }
        .input-row { display: flex; gap: 8px; }
        input { flex: 1; padding: 12px; background: #adcbe3; border: 1px solid #000; font-weight: bold; }
        button { cursor: pointer; border: 1px solid #000; background: #adcbe3; font-weight: bold; text-transform: uppercase; }
        .main-btn { padding: 15px; font-size: 16px; width: 100%; margin-top: 5px; }
        .details-area { flex-grow: 1; border: 1px solid #000; background: #d1e3f0; padding: 15px; min-height: 200px; }
        #scanner-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #reader { width: 320px; background: white; border: 2px solid #adcbe3; }
        .hidden { display: none; }
        .loan-warning { color: red; font-weight: bold; font-size: 13px; margin-top: 10px; }
        .student-name { font-size: 16px; font-weight: bold; color: #333; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="blue-box">
        <div class="white-inner">
            <div id="search-view">
                <div class="input-row" style="margin-bottom: 20px;">
                    <input type="text" id="isbn-search" placeholder="ISBN">
                    <button style="padding: 10px;" onclick="openScanner()">SCAN</button>
                </div>
                <button class="main-btn" onclick="lookupBook()">GO</button>
            </div>

            <div id="details-view" class="hidden">
                <input type="text" id="display-isbn" readonly>
                <input type="text" id="display-name" readonly>
                
                <div class="details-area">
                    <p style="margin: 0 0 10px 0; font-size: 13px;">Enter Student ID to proceed:</p>
                    <div class="input-row">
                        <input type="text" id="studentId" placeholder="STUDENT ID" style="background: white;">
                        <button onclick="verifyStudent()" style="padding: 0 10px;">✔️</button>
                    </div>
                    
                    <div id="student-display" style="margin-top: 15px;">
                        <div id="student-name-field" class="student-name"></div>
                        <div id="loan-msg-area"></div>
                    </div>
                </div>

                <div id="action-buttons" class="hidden">
                    <button class="main-btn" onclick="handleTransaction('borrow')">BORROW</button>
                    <button class="main-btn" onclick="handleTransaction('return')">RETURN</button>
                </div>
                <button style="background: none; border: none; text-decoration: underline; font-size: 12px; margin-top: 10px;" onclick="resetUI()">← BACK TO SEARCH</button>
            </div>
        </div>
    </div>

    <div id="scanner-modal">
        <div id="reader"></div>
        <button style="margin-top:20px; background:white; padding:10px 20px;" onclick="closeScanner()">CANCEL</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        // Your Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCF-9XTUu7USBk6vXtuN2140tlgXg-PgBM",
            authDomain: "school-library-61744.firebaseapp.com",
            projectId: "school-library-61744",
            storageBucket: "school-library-61744.firebasestorage.app",
            messagingSenderId: "583661514926",
            appId: "1:583661514926:web:7804174a5a127198fb3d3f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let scanner = null;

        window.resetUI = () => {
            document.getElementById('search-view').classList.remove('hidden');
            document.getElementById('details-view').classList.add('hidden');
            document.getElementById('action-buttons').classList.add('hidden');
            document.getElementById('loan-msg-area').innerHTML = '';
            document.getElementById('student-name-field').innerText = '';
            document.getElementById('studentId').value = '';
            document.getElementById('isbn-search').value = '';
        };

        window.openScanner = () => {
            document.getElementById('scanner-modal').style.display = 'flex';
            scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 150} });
            scanner.render((text) => {
                document.getElementById('isbn-search').value = text;
                closeScanner();
                lookupBook();
            });
        };

        window.closeScanner = () => {
            if (scanner) scanner.clear();
            document.getElementById('scanner-modal').style.display = 'none';
        };

        window.lookupBook = async () => {
            const isbn = document.getElementById('isbn-search').value.trim();
            if (!isbn) return;
            const bookSnap = await getDoc(doc(db, "books", isbn));
            if (!bookSnap.exists()) return alert("Book not found in library system.");
            
            const data = bookSnap.data();
            document.getElementById('display-isbn').value = isbn;
            document.getElementById('display-name').value = data.name || data.title;
            document.getElementById('search-view').classList.add('hidden');
            document.getElementById('details-view').classList.remove('hidden');
        };

        window.verifyStudent = async () => {
            const sid = document.getElementById('studentId').value.trim();
            const nameField = document.getElementById('student-name-field');
            const loanArea = document.getElementById('loan-msg-area');
            const actionBtns = document.getElementById('action-buttons');
            
            if (!sid) return;
            loanArea.innerHTML = "Verifying...";
            nameField.innerText = "";

            const studentSnap = await getDoc(doc(db, "students", sid));
            
            if (!studentSnap.exists()) {
                loanArea.innerHTML = "<p class='loan-warning'>STUDENT NOT REGISTERED</p>";
                actionBtns.classList.add('hidden');
                return;
            }

            const data = studentSnap.data();
            
            // Display student name if available in the doc
            nameField.innerText = data.studentName || data.name || "Student: " + sid;

            let loans = [];
            
            // Check for status: "borrowed"
            for (const [isbn, info] of Object.entries(data)) {
                // Ignore the name field itself if it exists as a key
                if (typeof info === 'object' && info !== null && info.status === "borrowed") {
                    loans.push(info.title || isbn);
                }
            }

            if (loans.length > 0) {
                loanArea.innerHTML = `<p class='loan-warning'>CURRENT LOAN:<br>${loans.join(', ')}</p>`;
            } else {
                loanArea.innerHTML = "<p style='color: green; font-weight: bold;'>No active loans</p>";
            }
            
            actionBtns.classList.remove('hidden');
        };

        window.handleTransaction = async (type) => {
            const sid = document.getElementById('studentId').value.trim();
            const isbn = document.getElementById('display-isbn').value;
            const bName = document.getElementById('display-name').value;
            const timestamp = new Date().toLocaleString();

            try {
                // Update Student Record Map
                await setDoc(doc(db, "students", sid), {
                    [isbn]: {
                        title: bName,
                        borrowDate: type === 'borrow' ? timestamp : null,
                        returnDate: type === 'return' ? timestamp : null,
                        status: type === 'borrow' ? "borrowed" : "returned"
                    }
                }, { merge: true });

                // Update Book Borrow History array
                await updateDoc(doc(db, "books", isbn), {
                    borrowHistory: arrayUnion({ studentId: sid, date: timestamp, action: type })
                });

                alert(`${type.toUpperCase()} SUCCESSFUL`);
                resetUI();
            } catch (e) {
                alert("Transaction failed: " + e.message);
            }
        };
    </script>
</body>
</html>
