<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Admin Dashboard</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; }
        
        /* Nav Bar */
        .navbar { background: #2c3e50; padding: 15px 30px; display: flex; gap: 25px; align-items: center; border-bottom: 3px solid #000; }
        .navbar a { color: white; text-decoration: none; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .navbar a:hover { color: #adcbe3; }
        .logo { color: #adcbe3; font-size: 20px; font-weight: 900; margin-right: auto; }

        .container { padding: 40px; }
        h2 { text-transform: uppercase; letter-spacing: 1px; }

        /* Spreadsheet Table */
        table { width: 100%; border-collapse: collapse; background: white; border: 2px solid #000; box-shadow: 4px 4px 0px #000; }
        th { background: #adcbe3; border: 1px solid #000; padding: 12px; text-align: left; text-transform: uppercase; font-size: 12px; }
        td { border: 1px solid #000; padding: 12px; font-size: 14px; }
        tr:nth-child(even) { background: #f9f9f9; }

        .overdue { background-color: #ffcccc !important; color: #b30000; font-weight: bold; }
        .status-tag { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; border: 1px solid #000; }
        
        #lock-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#adcbe3; display:flex; justify-content:center; align-items:center; z-index:10000; }
    </style>
</head>
<body onload="checkAccess()">

    <div id="lock-screen">
        <div style="background:white; padding:40px; border:2px solid #000; box-shadow:5px 5px 0 #000; text-align:center;">
            <h3>ADMIN ACCESS REQUIRED</h3>
            <p>Please enter your Admin Code to view loans.</p>
            <input type="password" id="adminPin" placeholder="Enter Code" style="padding:10px; width:200px; border:2px solid #000;"><br><br>
            <button onclick="verifyAdmin()" style="padding:10px 20px; background:#2c3e50; color:white; border:none; cursor:pointer; font-weight:bold;">UNLOCK DASHBOARD</button>
        </div>
    </div>

    <div class="navbar">
        <div class="logo">LIB-ADMIN</div>
        <a href="index.html">Home (Borrowing)</a>
        <a href="add_book.html">Add New Book</a>
        <a href="add_student.html">Add Student</a>
    </div>

    <div class="container">
        <h2>Active Loans Spreadsheet</h2>
        <table id="loanTable">
            <thead>
                <tr>
                    <th>Student Name</th>
                    <th>Tutor</th>
                    <th>Book Title</th>
                    <th>ISBN</th>
                    <th>Date Borrowed</th>
                    <th>Days Out</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCF-9XTUu7USBk6vXtuN2140tlgXg-PgBM",
            authDomain: "school-library-61744.firebaseapp.com",
            projectId: "school-library-61744",
            storageBucket: "school-library-61744.firebasestorage.app",
            messagingSenderId: "583661514926",
            appId: "1:583661514926:web:7804174a5a127198fb3d3f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Access Verification
        window.verifyAdmin = async () => {
            const pin = document.getElementById('adminPin').value;
            const adminSnap = await getDoc(doc(db, "admin", pin));
            
            if (adminSnap.exists()) {
                document.getElementById('lock-screen').style.display = 'none';
                loadSpreadsheet();
            } else {
                alert("Incorrect Admin Code.");
            }
        };

        async function loadSpreadsheet() {
            const querySnapshot = await getDocs(collection(db, "students"));
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = ""; // Clear loader

            querySnapshot.forEach((studentDoc) => {
                const student = studentDoc.data();
                const studentName = `${student.Name} ${student["Last Name"]}`;
                const tutor = student.Tutor;

                // Loop through all keys in the student document to find book maps
                for (const [isbn, data] of Object.entries(student)) {
                    if (typeof data === 'object' && data.status === "borrowed") {
                        
                        // Calculate days held
                        const borrowDate = new Date(data.borrowDate);
                        const today = new Date();
                        const diffTime = Math.abs(today - borrowDate);
                        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                        const row = document.createElement('tr');
                        // Highlight red if over 7 days
                        if (diffDays > 7) row.className = "overdue";

                        row.innerHTML = `
                            <td>${studentName}</td>
                            <td>${tutor}</td>
                            <td>${data.title}</td>
                            <td>${isbn}</td>
                            <td>${data.borrowDate}</td>
                            <td>${diffDays} Days</td>
                        `;
                        tableBody.appendChild(row);
                    }
                }
            });
        }
    </script>
</body>
</html>
